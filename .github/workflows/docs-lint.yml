name: Markdown quality

on:
  pull_request:
    paths: ["docs/**", "**/*.md"]
  push:
    branches: [main]
    paths: ["docs/**", "**/*.md"]

concurrency:
  group: markdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npx cspell "docs/**" "**/*.md"
      - run: npx markdownlint-cli2 "docs/**" "**/*.md"
